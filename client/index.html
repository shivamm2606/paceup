<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- Theme -->
    <meta name="theme-color" content="#0b0b10" />

    <!-- SEO -->
    <meta
      name="description"
      content="Track workouts, build gym templates, monitor progress, and stay consistent with RepUp."
    />
    <meta
      name="keywords"
      content="fitness, workout tracker, gym app, fitness tracker, workout log"
    />
    <meta name="author" content="RepUp" />

    <!-- Open Graph -->
    <meta property="og:title" content="RepUp - Every rep counts." />
    <meta
      property="og:description"
      content="Track workouts and crush your fitness goals with RepUp."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/repup-icon-192.png"
    />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="RepUp" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/repup-apple-touch-icon.png"
    />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>RepUp - Every rep counts.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
